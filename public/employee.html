<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Dashboard - SchoolsPLP PTO</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="navbar">
      <h2>Employee Dashboard</h2>
      <div class="mobile-nav">
        <button id="hamburgerBtn" class="hamburger">☰</button>
        <div id="mobileMenu" class="mobile-menu hidden">
          <button id="employeeSettings" class="employee-settings">
            Settings
          </button>
          <button id="logoutMobile" class="logout-btn">Logout</button>
        </div>
      </div>
      <button id="logoutBtn" class="logoutBtnEmployee">Logout</button>
    </div>

    <div class="tab-content">
      <section id="overview">
        <h3>PTO Overview</h3>
        <p><strong>Total Allotted:</strong> <span id="total"></span> days</p>
        <p><strong>Total Used:</strong> <span id="used"></span> days</p>
        <p><strong>Remaining:</strong> <span id="remaining"></span> days</p>
      </section>

      <section id="history">
        <h3 id="pto-history">PTO History</h3>
        <table id="historyTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Hours Used</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section id="policy" class="tab-content">
        <h3 id="current-pto-policy">Current PTO Policy</h3>
        <table id="policyTable">
          <thead>
            <tr>
              <th>Years of Service</th>
              <th>Days Allowed</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
      <div id="policyMobileContainer" class="mobile-policy hidden"></div>
    </div>

    <!-- Settings -->

    <!-- Settings -->
    <div id="settings" class="tab-content hidden">
      <h3>Settings</h3>
      <p>Username: <span id="usernameDisplay">aiyana.pomato</span></p>

      <label>Current Password:</label>
      <input
        id="currentPassword"
        type="password"
        placeholder="Current Password"
      />

      <label>New Password:</label>
      <input id="newPassword" type="password" placeholder="New Password" />

      <label>Confirm New Password:</label>
      <input
        id="confirmPassword"
        type="password"
        placeholder="Confirm New Password"
      />

      <button id="saveSettings">Save Changes</button>
    </div>

    <script src="js/employee.js"></script>
  </body>
</html>
